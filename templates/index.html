<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pixy - Assistant Domotique</title>
</head>

<body>
  <label for=""> Entrez le nombre de seconde : </label>
  <input type="number" name="nbr_sec" id="nbr_sec">
  <button type="button" id="Launch">Lancer l'enregistrement</button>

</body>


<script>

let recorder;
let chunks = [];

async function startRecording() {
  const stream = await navigator.mediaDevices.getUserMedia({
    audio: true
  });

  recorder = new MediaRecorder(stream);

  recorder.ondataavailable = e => {
    chunks.push(e.data);
  };

  recorder.start();
}

function stopRecording() {

  recorder.onstop = async () => {

    const blob = new Blob(chunks, {
      type: recorder.mimeType
    });

    const formData = new FormData();
    formData.append("audio", blob, "audio.webm");

    await fetch("/upload", {
      method: "POST",
      body: formData
    });



    chunks = [];

    alert("opération terminée");
  };

  recorder.stop();
}

function Apply(seconds) {

  startRecording();

  setTimeout(() => {
    stopRecording();
  }, seconds * 1000);
}

document.getElementById("Launch").onclick = () => {
  let nbr = parseInt(document.getElementById("nbr_sec").value);
  Apply(nbr);
};

</script>

</html>
